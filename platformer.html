<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Platformer Volledig Scherm</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #222;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }
    #game {
      display: block;
      margin: 0 auto;
      background: #87ceeb;
      outline: none;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100vw;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 2.2vw;
      color: #fff;
      text-shadow: 2px 2px 8px #000;
      user-select: none;
      pointer-events: none;
      z-index: 10;
    }
    #startscherm, #winscherm {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #startscherm h1, #winscherm h1 {
      color: #ffe066;
      font-size: 4vw;
      margin-bottom: 1vw;
      text-shadow: 2px 2px 10px #000;
    }
    #startscherm button, #winscherm button {
      font-size: 2vw;
      padding: 1vw 2vw;
      margin-top: 2vw;
      background: #ffe066;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 2px 2px 8px #0008;
    }
    #startscherm p {
      color: #fff;
      font-size: 1.3vw;
      max-width: 40vw;
      text-align: center;
      margin: 0 0 2vw 0;
      text-shadow: 1px 1px 6px #000;
    }
    @media (max-width: 800px) {
      #ui { font-size: 3.5vw; }
      #startscherm h1, #winscherm h1 { font-size: 7vw; }
      #startscherm button, #winscherm button { font-size: 4vw; }
      #startscherm p { font-size: 2.5vw; }
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui"></div>
<div id="startscherm">
  <h1>Platformer</h1>
  <p>
    Spring met <b>spatie</b> en beweeg met <b>← →</b>.<br>
    Bereik de rechterrand om naar het volgende level te gaan.<br>
    Haal alle 10 levels!<br><br>
    <i>Tip: Je kunt springen terwijl je beweegt.</i>
  </p>
  <button onclick="startGame()">Start spel</button>
</div>
<div id="winscherm" style="display:none">
  <h1>Je hebt gewonnen! 🎉</h1>
  <button onclick="restartGame()">Speel opnieuw</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const startscherm = document.getElementById('startscherm');
const winscherm = document.getElementById('winscherm');

// Leveldata: 10 unieke platform layouts
const levels = [
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 150, y: 270, w: 120, h: 20 }, { x: 350, y: 220, w: 120, h: 20 }, { x: 600, y: 180, w: 120, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 100, y: 280, w: 100, h: 20 }, { x: 250, y: 220, w: 100, h: 20 }, { x: 400, y: 160, w: 100, h: 20 }, { x: 600, y: 120, w: 100, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 200, y: 300, w: 100, h: 20 }, { x: 350, y: 250, w: 80, h: 20 }, { x: 500, y: 200, w: 100, h: 20 }, { x: 650, y: 160, w: 80, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 80, y: 320, w: 80, h: 20 }, { x: 200, y: 260, w: 120, h: 20 }, { x: 400, y: 200, w: 120, h: 20 }, { x: 600, y: 120, w: 120, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 120, y: 280, w: 140, h: 20 }, { x: 320, y: 200, w: 140, h: 20 }, { x: 540, y: 120, w: 140, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 70, y: 300, w: 80, h: 20 }, { x: 200, y: 250, w: 100, h: 20 }, { x: 400, y: 180, w: 120, h: 20 }, { x: 650, y: 120, w: 80, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 180, y: 310, w: 80, h: 20 }, { x: 340, y: 260, w: 120, h: 20 }, { x: 520, y: 200, w: 120, h: 20 }, { x: 700, y: 140, w: 60, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 110, y: 290, w: 120, h: 20 }, { x: 260, y: 240, w: 120, h: 20 }, { x: 430, y: 180, w: 120, h: 20 }, { x: 680, y: 140, w: 80, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 90, y: 320, w: 80, h: 20 }, { x: 230, y: 270, w: 120, h: 20 }, { x: 450, y: 210, w: 120, h: 20 }, { x: 600, y: 160, w: 100, h: 20 } ],
  [ { x: 0, y: 90, w: 10000, h: 40 }, { x: 160, y: 280, w: 120, h: 20 }, { x: 370, y: 210, w: 120, h: 20 }, { x: 590, y: 160, w: 120, h: 20 } ]
];
let currentLevel = 0, platforms = [], running = false;

// Speler
let player = { x: 50, y: 0, w: 40, h: 40, vx: 0, vy: 0, grounded: false };
const gravity = 0.6, jumpPower = -12, moveSpeed = 5;

// Input
let keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

// Canvas altijd fullscreen
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawBackground() {
  // Lucht
  ctx.fillStyle = "#87ceeb";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Zon
  ctx.beginPath();
  ctx.arc(canvas.width - 120, 80, 50, 0, 2 * Math.PI);
  ctx.fillStyle = "#ffe066";
  ctx.fill();

  // Wolken
  function drawCloud(x, y, s) {
    ctx.beginPath();
    ctx.arc(x, y, 24 * s, Math.PI * 0.5, Math.PI * 1.5);
    ctx.arc(x + 30 * s, y - 24 * s, 30 * s, Math.PI * 1, Math.PI * 1.85);
    ctx.arc(x + 60 * s, y, 24 * s, Math.PI * 1.5, Math.PI * 0.5);
    ctx.closePath();
    ctx.fillStyle = "#fff";
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  drawCloud(canvas.width * 0.15, 80, 1.2);
  drawCloud(canvas.width * 0.35, 60, 0.9);
  drawCloud(canvas.width * 0.75, 100, 1.5);
  drawCloud(canvas.width * 0.5, 50, 0.7);

  // Gras
  ctx.fillStyle = "#5cb85c";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
}

function resetPlayer() {
  player.x = 50;
  player.y = canvas.height - 160;
  player.vx = 0;
  player.vy = 0;
  player.grounded = false;
}

function nextLevel() {
  currentLevel++;
  if (currentLevel >= levels.length) {
    running = false;
    winscherm.style.display = "";
    ui.textContent = "";
    return;
  }
  platforms = makeLevelForScreen(currentLevel);
  resetPlayer();
  showLevelUI();
}

function showLevelUI() {
  ui.textContent = `Level ${currentLevel + 1} / 10`;
}

function makeLevelForScreen(levelIndex) {
  // Schaal platforms mee met schermhoogte
  let lvl = levels[levelIndex];
  let scaleY = (canvas.height - 40 - 50) / (400 - 40 - 50); // platforms tussen 50px en bodem
  return lvl.map(p => ({
    x: p.x / 800 * canvas.width,
    y: (canvas.height - 40) - ((360 - p.y) * scaleY),
    w: p.w / 800 * canvas.width,
    h: p.h
  }));
}

function update() {
  // Links/rechts bewegen
  if (keys['ArrowLeft']) player.vx = -moveSpeed;
  else if (keys['ArrowRight']) player.vx = moveSpeed;
  else player.vx = 0;

  // Springen
  if (keys['Space'] && player.grounded) {
    player.vy = jumpPower;
    player.grounded = false;
  }

  // Zwaartekracht
  player.vy += gravity;

  // Positie updaten
  player.x += player.vx;
  player.y += player.vy;

  // Platform collision
  player.grounded = false;
  platforms.forEach(p => {
    if (player.x < p.x + p.w &&
        player.x + player.w > p.x &&
        player.y < p.y + p.h &&
        player.y + player.h > p.y) {
      // Van boven landen
      if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
      }
    }
  });

  // Binnen het scherm blijven
  if (player.x < 0) player.x = 0;
  if (player.y + player.h > canvas.height) {
    player.y = canvas.height - player.h;
    player.vy = 0;
    player.grounded = true;
  }

  // Ga naar volgend level als je de rechterrand raakt
  if (player.x + player.w >= canvas.width) {
    nextLevel();
  }
}

function draw() {
  drawBackground();

  // Platforms
  ctx.fillStyle = "#654321";
  platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

  // Speler
  ctx.fillStyle = "#ff0000";
  ctx.fillRect(player.x, player.y, player.w, player.h);
}

function gameLoop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  startscherm.style.display = "none";
  winscherm.style.display = "none";
  running = true;
  currentLevel = 0;
  platforms = makeLevelForScreen(currentLevel);
  resetPlayer();
  showLevelUI();
  gameLoop();
}

function restartGame() {
  startGame();
}

window.addEventListener('resize', () => {
  if (running) {
    platforms = makeLevelForScreen(currentLevel);
    // Houd speler op platform bij resize
    if (player.y + player.h > canvas.height - 40) {
      player.y = canvas.height - 40 - player.h;
      player.vy = 0;
      player.grounded = true;
    }
  }
});

</script>
</body>
</html>
