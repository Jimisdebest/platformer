<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Platformer Volledig Scherm</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #222;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }
    #game {
      display: block;
      margin: 0 auto;
      background: #87ceeb;
      outline: none;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100vw;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 2.2vw;
      color: #fff;
      text-shadow: 2px 2px 8px #000;
      user-select: none;
      pointer-events: none;
      z-index: 10;
    }
    #startscherm, #winscherm {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #startscherm h1, #winscherm h1 {
      color: #ffe066;
      font-size: 4vw;
      margin-bottom: 1vw;
      text-shadow: 2px 2px 10px #000;
    }
    #startscherm button, #winscherm button {
      font-size: 2vw;
      padding: 1vw 2vw;
      margin-top: 2vw;
      background: #ffe066;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 2px 2px 8px #0008;
    }
    #startscherm p {
      color: #fff;
      font-size: 1.3vw;
      max-width: 40vw;
      text-align: center;
      margin: 0 0 2vw 0;
      text-shadow: 1px 1px 6px #000;
    }
    @media (max-width: 800px) {
      #ui { font-size: 3.5vw; }
      #startscherm h1, #winscherm h1 { font-size: 7vw; }
      #startscherm button, #winscherm button { font-size: 4vw; }
      #startscherm p { font-size: 2.5vw; }
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui"></div>
<div id="startscherm">
  <h1>Platformer</h1>
  <p>
    Spring met <b>spatie</b> en beweeg met <b>← →</b>.<br>
    Bereik de rechterrand om naar het volgende level te gaan.<br>
    Haal alle 10 levels!<br><br>
    <i>Tip: Je kunt springen terwijl je beweegt.</i>
  </p>
  <button onclick="startGame()">Start spel</button>
</div>
<div id="winscherm" style="display:none">
  <h1>Je hebt gewonnen! 🎉</h1>
  <button onclick="restartGame()">Speel opnieuw</button>
</div>
